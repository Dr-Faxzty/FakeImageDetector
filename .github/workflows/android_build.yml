name: Android CI Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 21
          target: default
          arch: x86
          profile: Nexus 4
          force-avd-creation: false
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: |
            boot_completed=false
            while [ "$boot_completed" = false ]; do
              status=$(adb shell getprop sys.boot_completed | tr -d '\r')
              if [ "$status" = "1" ]; then
                service_check=$(adb shell service check package)
                if echo "$service_check" | grep -q "found"; then
                  boot_completed=true
                fi
              fi
              if [ "$boot_completed" = false ]; then
                echo "Waiting for Android Service Manager..."
                sleep 10
              fi
            done
            echo "Android is fully ready! Starting tests..."
            ./gradlew connectedDebugAndroidTest

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            app/build/reports/tests/
            app/build/reports/androidTests/

      - name: Release APK
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: "Ultima Versione Stabile (Auto-generated)"
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}